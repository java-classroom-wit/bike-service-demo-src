spring.application.name=bike-service

# Wyłączamy bean z danymi startowymi (@Profile("!test")) podczas testów.
spring.profiles.active=test

# Baza danych H2 (in-memory)
spring.datasource.url=jdbc:h2:mem:bike_service_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA - schemat zarzadzany przez Liquibase, NIE przez Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.contexts=dev

# -------------------------------------------------------
# Hibernate Second-Level Cache (L2) via Ehcache / JCache
# CacheManager jest tworzony przez Spring (CacheConfig)
# i wstrzykiwany do Hibernate przez HibernateCacheCustomizer
# -------------------------------------------------------
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_query_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory
# Statystyki cache - widoczne w logach
spring.jpa.properties.hibernate.generate_statistics=false

# Wylaczenie verbose logowania metryk sesji (StatisticalLoggingSessionEventListener)
logging.level.org.hibernate.engine.internal.StatisticalLoggingSessionEventListener=OFF

# Upload plików
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload-dir=uploads
app.max-page-size=50

